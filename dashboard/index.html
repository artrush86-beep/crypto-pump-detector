<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Pump Detector - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1::before {
            content: '🚀';
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8b949e;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #238636;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 600;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: #30363d;
        }
        
        .filter-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }
        
        .signals-table {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 1fr 0.7fr 1fr 0.9fr 0.6fr 1fr 0.9fr 0.9fr 1fr 0.6fr 0.8fr 0.9fr 1.2fr;
            gap: 8px;
            padding: 12px 15px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            font-size: 10px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .signal-row {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .signal-row:hover {
            background: #1c2128;
        }
        
        .signal-row:last-child {
            border-bottom: none;
        }
        
        .symbol {
            font-weight: 600;
            font-size: 14px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-pump {
            background: rgba(35, 134, 54, 0.2);
            color: #3fb950;
        }
        
        .badge-dump {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
        }
        
        .score {
            font-weight: 600;
            font-size: 16px;
        }
        
        .score-high { color: #3fb950; }
        .score-medium { color: #d29922; }
        .score-low { color: #8b949e; }
        
        .change {
            font-size: 14px;
            font-family: monospace;
        }
        
        .change-positive { color: #3fb950; }
        .change-negative { color: #f85149; }
        
        .price {
            font-family: monospace;
            font-size: 13px;
            color: #8b949e;
        }
        
        .exchange {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        .time {
            font-size: 12px;
            color: #8b949e;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        
        .error {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .config-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .config-panel input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 10px 15px;
            border-radius: 6px;
            width: 100%;
            max-width: 500px;
            font-size: 14px;
        }
        
        .config-panel button {
            background: #238636;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .config-panel button:hover {
            background: #2ea043;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border-radius: 12px;
            width: 90%;
            max-width: 1000px;
            height: 80%;
            overflow: hidden;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        #tradingview-widget {
            width: 100%;
            height: calc(100% - 60px);
        }
        
        .signal-row {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="modal" id="chartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="chartTitle">Chart</h3>
                <button class="modal-close" onclick="closeChart()">&times;</button>
            </div>
            <div id="tradingview-widget"></div>
        </div>
    </div>
    <div class="header">
        <h1>Crypto Pump Detector</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
            <span style="margin-left: 15px; color: #484f58;">|</span>
            <span style="margin-left: 15px;">Auto-refresh: 30s</span>
        </div>
    </div>
    
    <div class="container">
        <div class="config-panel">
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="color: #8b949e; font-size: 14px;">API URL:</label>
                <input type="text" id="apiUrl" placeholder="https://your-app.railway.app/api/signals" 
                       value="">
                <button onclick="saveConfig()">Connect</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Signals</h3>
                <div class="stat-value" id="totalSignals">-</div>
            </div>
            <div class="stat-card">
                <h3>Pumps</h3>
                <div class="stat-value" id="pumpCount" style="color: #3fb950;">-</div>
            </div>
            <div class="stat-card">
                <h3>Dumps</h3>
                <div class="stat-value" id="dumpCount" style="color: #f85149;">-</div>
            </div>
            <div class="stat-card">
                <h3>Scanning Pairs</h3>
                <div class="stat-value" id="pairsCount" style="color: #58a6ff;">73</div>
            </div>
            <div class="stat-card">
                <h3>Last Update</h3>
                <div class="stat-value" id="lastUpdate" style="font-size: 18px; margin-top: 8px;">-</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterSignals('all')">All Signals</button>
            <button class="filter-btn" onclick="filterSignals('pump')">Pumps Only</button>
            <button class="filter-btn" onclick="filterSignals('dump')">Dumps Only</button>
        </div>
        
        <div class="signals-table">
            <div class="table-header">
                <div>Symbol</div>
                <div>Type</div>
                <div>Stage</div>
                <div>Direction</div>
                <div>Score</div>
                <div>Price</div>
                <div>OI Change</div>
                <div>Volume</div>
                <div>Funding</div>
                <div>L/S</div>
                <div>Timeframe</div>
                <div>Exchange</div>
                <div>Time (MSK)</div>
            </div>
            <div id="signalsList">
                <div class="loading">Enter API URL and click Connect to load signals...</div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let signalsData = [];
        let apiUrl = localStorage.getItem('apiUrl') || '';
        
        document.getElementById('apiUrl').value = apiUrl;
        
        if (apiUrl) {
            fetchSignals();
            setInterval(fetchSignals, 30000); // Auto-refresh every 30s
        }
        
        function saveConfig() {
            apiUrl = document.getElementById('apiUrl').value.trim();
            if (!apiUrl) {
                alert('Please enter API URL');
                return;
            }
            localStorage.setItem('apiUrl', apiUrl);
            fetchSignals();
            setInterval(fetchSignals, 30000);
        }
        
        async function fetchSignals() {
            if (!apiUrl) return;
            
            try {
                updateStatus('loading');
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                signalsData = data.signals || [];
                
                updateStats(data);
                renderSignals();
                updateStatus('connected');
            } catch (error) {
                console.error('Fetch error:', error);
                updateStatus('error');
                document.getElementById('signalsList').innerHTML = 
                    `<div class="error">Failed to fetch signals: ${error.message}</div>`;
            }
        }
        
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            switch(status) {
                case 'connected':
                    dot.style.background = '#238636';
                    dot.style.animation = 'pulse 2s infinite';
                    text.textContent = 'Connected';
                    break;
                case 'loading':
                    dot.style.background = '#d29922';
                    dot.style.animation = 'none';
                    text.textContent = 'Loading...';
                    break;
                case 'error':
                    dot.style.background = '#f85149';
                    dot.style.animation = 'none';
                    text.textContent = 'Disconnected';
                    break;
                default:
                    dot.style.background = '#8b949e';
                    text.textContent = 'Connecting...';
            }
        }
        
        function updateStats(data) {
            document.getElementById('totalSignals').textContent = data.total || 0;
            
            const pumps = signalsData.filter(s => s.signal_type?.toLowerCase() === 'pump').length;
            const dumps = signalsData.filter(s => s.signal_type?.toLowerCase() === 'dump').length;
            
            document.getElementById('pumpCount').textContent = pumps;
            document.getElementById('dumpCount').textContent = dumps;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        function filterSignals(type) {
            currentFilter = type;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderSignals();
        }
        
        function renderSignals() {
            console.log('Rendering signals:', signalsData);
            
            let filtered = signalsData;
            
            if (currentFilter !== 'all') {
                filtered = signalsData.filter(s => s.signal_type?.toLowerCase() === currentFilter);
            }
            
            if (filtered.length === 0) {
                document.getElementById('signalsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No ${currentFilter === 'all' ? '' : currentFilter} signals yet</div>
                    </div>
                `;
                return;
            }
            
            try {
                const html = filtered.map((signal, index) => {
                    console.log(`Signal ${index}:`, signal);
                    
                    // Defensive check for null/undefined signal
                    if (!signal || typeof signal !== 'object') {
                        console.warn(`Invalid signal at index ${index}:`, signal);
                        return '';
                    }
                    
                    const isPump = signal.signal_type === 'pump';
                    const score = parseFloat(signal.score) || 0;
                    const scoreClass = score >= 4 ? 'score-high' : 
                                      score >= 3 ? 'score-medium' : 'score-low';
                    
                    // Handle both database fields (snake_case) and API fields
                    let oiChange = signal.oi_change ?? signal.oiChange ?? 0;
                    let volumeChange = signal.volume_change ?? signal.volumeChange ?? 0;
                    let price = signal.price ?? 0;
                    let exchange = signal.exchange ?? '-';
                    let symbol = signal.symbol ?? '?';
                    let signalType = signal.signal_type ?? '?';
                    let timestamp = signal.timestamp;
                    let stage = signal.stage ?? 'CONFIRMED';
                    let bias = signal.bias ?? (isPump ? 'LONG' : 'SHORT');
                    let fundingRate = signal.funding_rate ?? signal.fundingRate ?? null;
                    let lsRatio = signal.long_short_ratio ?? signal.longShortRatio ?? null;
                    let timeframe = signal.timeframe ?? '15m';
                    let factors = signal.factors ?? signal.details?.factors ?? [];
                    
                    // Ensure numeric values
                    oiChange = parseFloat(oiChange) || 0;
                    volumeChange = parseFloat(volumeChange) || 0;
                    price = parseFloat(price) || 0;
                    lsRatio = parseFloat(lsRatio) || 0;
                    
                    return `
                        <div class="signal-row" onclick="openChart('${symbol}')" style="display: grid; grid-template-columns: 1fr 0.7fr 1fr 0.9fr 0.6fr 1fr 0.9fr 0.9fr 1fr 0.6fr 0.8fr 0.9fr 1.2fr; gap: 8px; padding: 12px 15px; border-bottom: 1px solid #30363d; align-items: center; font-size: 12px;">
                            <div class="symbol" style="font-weight: 600; color: #58a6ff;">${symbol}</div>
                            <div>
                                <span class="badge ${isPump ? 'badge-pump' : 'badge-dump'}">
                                    ${signalType}
                                </span>
                            </div>
                            <div>${formatStage(stage)}</div>
                            <div>${formatDirection(bias, signalType)}</div>
                            <div class="score ${scoreClass}">${score}/5</div>
                            <div class="price">$${formatNumber(price)}</div>
                            <div class="change ${oiChange > 0 ? 'change-positive' : 'change-negative'}">
                                ${oiChange > 0 ? '+' : ''}${oiChange.toFixed(1)}%
                            </div>
                            <div class="change ${volumeChange > 0 ? 'change-positive' : 'change-negative'}">
                                ${volumeChange > 0 ? '+' : ''}${volumeChange.toFixed(1)}%
                            </div>
                            <div>${formatFunding(fundingRate)}</div>
                            <div style="font-size: 11px;">${lsRatio ? lsRatio.toFixed(2) : '-'}</div>
                            <div style="color: #8b949e; font-size: 11px;">${timeframe}</div>
                            <div class="exchange">${exchange}</div>
                            <div class="time">${formatTime(timestamp)}</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('signalsList').innerHTML = html || `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No valid signals to display</div>
                    </div>
                `;
            } catch (err) {
                console.error('Render error:', err);
                document.getElementById('signalsList').innerHTML = `
                    <div class="error">Render error: ${err.message}</div>
                `;
            }
        }
        
        function openChart(symbol) {
            document.getElementById('chartTitle').textContent = `Chart: ${symbol}`;
            document.getElementById('chartModal').classList.add('active');
            
            const widgetContainer = document.getElementById('tradingview-widget');
            widgetContainer.innerHTML = '';
            
            // TradingView symbol format for Binance perpetuals
            const tvSymbol = `BINANCE:${symbol}.P`;
            
            new TradingView.widget({
                container: 'tradingview-widget',
                symbol: tvSymbol,
                interval: '15',
                timezone: 'Europe/Moscow',
                theme: 'dark',
                style: '1',
                locale: 'ru',
                toolbar_bg: '#161b22',
                enable_publishing: false,
                hide_top_toolbar: false,
                hide_legend: false,
                save_image: false,
                height: '100%',
                width: '100%'
            });
        }
        
        function closeChart() {
            document.getElementById('chartModal').classList.remove('active');
            document.getElementById('tradingview-widget').innerHTML = '';
        }
        
        // Close modal on click outside
        document.getElementById('chartModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeChart();
            }
        });
        
        function formatNumber(num) {
            if (!num) return '-';
            if (num >= 1000) return num.toFixed(0);
            if (num >= 1) return num.toFixed(2);
            return num.toFixed(4);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            // Add 3 hours for Moscow time (UTC+3)
            const mskDate = new Date(date.getTime() + 3 * 60 * 60 * 1000);
            return mskDate.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false 
            }) + ' MSK';
        }
        
        function formatFunding(fundingRate) {
            if (!fundingRate && fundingRate !== 0) return '-';
            const percent = (fundingRate * 100).toFixed(4);
            const color = fundingRate < 0 ? '#3fb950' : '#f85149';
            const direction = fundingRate < 0 ? 'Shorts pay' : 'Longs pay';
            return `<span style="color: ${color}">${percent}%</span><br><small style="color: #8b949e">${direction}</small>`;
        }
        
        function formatDirection(bias, signalType) {
            if (!bias) return signalType === 'pump' ? 'LONG' : 'SHORT';
            const isLong = bias.toUpperCase().includes('LONG') || bias.toUpperCase().includes('PUMP');
            const color = isLong ? '#3fb950' : '#f85149';
            const arrow = isLong ? '↑' : '↓';
            return `<span style="color: ${color}; font-weight: bold;">${arrow} ${bias.toUpperCase()}</span>`;
        }
        
        function formatStage(stage) {
            if (!stage) return '-';
            const isEarly = stage.toUpperCase().includes('EARLY');
            const bg = isEarly ? '#d29922' : '#238636';
            const text = isEarly ? 'РАНО, ЖДЕМ' : 'ЗАХОДИМ';
            return `<span style="background: ${bg}; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold;">${text}</span>`;
        }
        
        function formatFactors(factors) {
            if (!factors || !Array.isArray(factors) || factors.length === 0) return '-';
            return factors.slice(0, 2).map(f => `<div style="font-size: 11px; color: #8b949e; margin: 1px 0;">• ${f}</div>`).join('');
        }
    </script>
</body>
</html>
