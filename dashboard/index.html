<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Pump Detector - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1::before {
            content: '🚀';
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8b949e;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #238636;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 600;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: #30363d;
        }
        
        .filter-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }
        
        .signals-table {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 1fr 0.7fr 1fr 0.9fr 0.6fr 1fr 0.9fr 0.9fr 1fr 0.6fr 0.5fr 0.6fr 1.5fr 0.9fr 1.2fr;
            gap: 8px;
            padding: 12px 15px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            font-size: 10px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            text-align: center;
        }
        
        .signal-row {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .signal-row:hover {
            background: #1c2128;
        }
        
        .signal-row:last-child {
            border-bottom: none;
        }
        
        .symbol {
            font-weight: 600;
            font-size: 14px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-pump {
            background: rgba(35, 134, 54, 0.2);
            color: #3fb950;
        }
        
        .badge-dump {
            background: rgba(248, 81, 73, 0.2);
            color: #f85149;
        }
        
        .score {
            font-weight: 600;
            font-size: 16px;
        }
        
        .score-high { color: #3fb950; }
        .score-medium { color: #d29922; }
        .score-low { color: #8b949e; }
        
        .change {
            font-size: 14px;
            font-family: monospace;
        }
        
        .change-positive { color: #3fb950; }
        .change-negative { color: #f85149; }
        
        .price {
            font-family: monospace;
            font-size: 13px;
            color: #8b949e;
        }
        
        .exchange {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
        }
        
        .time {
            font-size: 12px;
            color: #8b949e;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        
        .error {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .config-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .config-panel input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 10px 15px;
            border-radius: 6px;
            width: 100%;
            max-width: 500px;
            font-size: 14px;
        }
        
        .config-panel button {
            background: #238636;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .config-panel button:hover {
            background: #2ea043;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border-radius: 12px;
            width: 90%;
            max-width: 1000px;
            height: 80%;
            overflow: hidden;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        #tradingview-widget {
            width: 100%;
            height: calc(100% - 60px);
        }
        
        .signal-row {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="modal" id="chartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="chartTitle">Chart</h3>
                <button class="modal-close" onclick="closeChart()">&times;</button>
            </div>
            <div id="tradingview-widget"></div>
        </div>
    </div>
    <div class="header">
        <h1>Crypto Pump Detector</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
            <span style="margin-left: 15px; color: #484f58;">|</span>
            <span style="margin-left: 15px;">Auto-refresh: 30s</span>
        </div>
    </div>
    
    <div class="container">
        <div class="config-panel">
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="color: #8b949e; font-size: 14px;">API URL:</label>
                <input type="text" id="apiUrl" placeholder="https://your-app.railway.app/api/signals" 
                       value="">
                <button onclick="saveConfig()">Connect</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Signals</h3>
                <div class="stat-value" id="totalSignals">-</div>
            </div>
            <div class="stat-card">
                <h3>Pumps</h3>
                <div class="stat-value" id="pumpCount" style="color: #3fb950;">-</div>
            </div>
            <div class="stat-card">
                <h3>Dumps</h3>
                <div class="stat-value" id="dumpCount" style="color: #f85149;">-</div>
            </div>
            <div class="stat-card">
                <h3>Binance Pairs</h3>
                <div class="stat-value" id="binancePairs" style="color: #f0b90b;">-</div>
            </div>
            <div class="stat-card">
                <h3>Bybit Pairs</h3>
                <div class="stat-value" id="bybitPairs" style="color: #00c853;">-</div>
            </div>
            <div class="stat-card">
                <h3>Last Update</h3>
                <div class="stat-value" id="lastUpdate" style="font-size: 18px; margin-top: 8px;">-</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterSignals('all')">Все сигналы</button>
            <button class="filter-btn" onclick="filterSignals('pump')">Только пампы</button>
            <button class="filter-btn" onclick="filterSignals('dump')">Только дампы</button>
        </div>
        
        <div class="signals-table">
            <div class="table-header">
                    <div class="col-symbol">МОНЕТА</div>
                    <div class="col-type">ТИП</div>
                    <div class="col-stage">ГОТОВНОСТЬ</div>
                    <div class="col-direction">КУДА</div>
                    <div class="col-score">ОЧКИ</div>
                    <div class="col-price">ЦЕНА</div>
                    <div class="col-oi">OI</div>
                    <div class="col-volume">ОБЪЁМ</div>
                    <div class="col-funding">ФАНДИНГ</div>
                    <div class="col-ls">L/S</div>
                    <div class="col-tf">ТФ</div>
                    <div class="col-signals">УВЕР</div>
                    <div class="col-factors">ФАКТОРЫ</div>
                    <div class="col-exchange">БИРЖА</div>
                    <div class="col-time">ВРЕМЯ (МСК)</div>
            </div>
            <div id="signalsList">
                <div class="loading">Enter API URL and click Connect to load signals...</div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let signalsData = [];
        let apiUrl = localStorage.getItem('apiUrl') || '';
        let refreshInterval = null;
        
        document.getElementById('apiUrl').value = apiUrl;
        
        if (apiUrl) {
            fetchSignals();
            refreshInterval = setInterval(fetchSignals, 60000); // Auto-refresh every 60s
        }
        
        function saveConfig() {
            apiUrl = document.getElementById('apiUrl').value.trim();
            if (!apiUrl) {
                alert('Please enter API URL');
                return;
            }
            localStorage.setItem('apiUrl', apiUrl);
            // Clear old interval before setting new one
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
            fetchSignals();
            refreshInterval = setInterval(fetchSignals, 30000);
        }
        
        async function fetchPairs() {
            if (!apiUrl) return;
            
            try {
                const pairsUrl = apiUrl.replace('/signals', '/pairs');
                const response = await fetch(pairsUrl);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('binancePairs').textContent = data.binance_pairs || 200;
                    document.getElementById('bybitPairs').textContent = data.bybit_pairs || 200;
                }
            } catch (e) {
                console.log('Pairs endpoint not available, using defaults');
                document.getElementById('binancePairs').textContent = '200';
                document.getElementById('bybitPairs').textContent = '200';
            }
        }
        
        async function fetchSignals() {
            if (!apiUrl) return;
            
            // Fetch pairs info first
            await fetchPairs();
            
            try {
                updateStatus('loading');
                const url = apiUrl.includes('?') ? `${apiUrl}&limit=200` : `${apiUrl}?limit=200`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                signalsData = data.signals || [];
                
                updateStats(data);
                renderSignals();
                updateStatus('connected');
            } catch (error) {
                console.error('Fetch error:', error);
                updateStatus('error');
                document.getElementById('signalsList').innerHTML = 
                    `<div class="error">Failed to fetch signals: ${error.message}</div>`;
            }
        }
        
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            switch(status) {
                case 'connected':
                    dot.style.background = '#238636';
                    dot.style.animation = 'pulse 2s infinite';
                    text.textContent = 'Connected';
                    break;
                case 'loading':
                    dot.style.background = '#d29922';
                    dot.style.animation = 'none';
                    text.textContent = 'Loading...';
                    break;
                case 'error':
                    dot.style.background = '#f85149';
                    dot.style.animation = 'none';
                    text.textContent = 'Disconnected';
                    break;
                default:
                    dot.style.background = '#8b949e';
                    text.textContent = 'Connecting...';
            }
        }
        
        function updateStats(data) {
            const highScoreSignals = signalsData.filter(s => (parseFloat(s.score) || 0) >= 3);
            document.getElementById('totalSignals').textContent = highScoreSignals.length;
            
            const pumps = highScoreSignals.filter(s => s.signal_type?.toLowerCase() === 'pump').length;
            const dumps = highScoreSignals.filter(s => s.signal_type?.toLowerCase() === 'dump').length;
            
            document.getElementById('pumpCount').textContent = pumps;
            document.getElementById('dumpCount').textContent = dumps;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        function filterSignals(type) {
            currentFilter = type;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderSignals();
        }
        
        function renderSignals() {
            console.log('Rendering signals:', signalsData);
            
            // Only show signals with score >= 3
            let filtered = signalsData.filter(s => (parseFloat(s.score) || 0) >= 3);
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(s => s.signal_type?.toLowerCase() === currentFilter);
            }
            
            if (filtered.length === 0) {
                document.getElementById('signalsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No ${currentFilter === 'all' ? '' : currentFilter} signals yet</div>
                    </div>
                `;
                return;
            }
            
            try {
                const html = filtered.map((signal, index) => {
                    console.log(`Signal ${index}:`, signal);
                    
                    // Defensive check for null/undefined signal
                    if (!signal || typeof signal !== 'object') {
                        console.warn(`Invalid signal at index ${index}:`, signal);
                        return '';
                    }
                    
                    const isPump = signal.signal_type === 'pump';
                    const score = parseFloat(signal.score) || 0;
                    const scoreClass = score >= 4 ? 'score-high' : 
                                      score >= 3 ? 'score-medium' : 'score-low';
                    
                    // Handle both database fields (snake_case) and API fields
                    let oiChange = signal.oi_change ?? signal.oiChange ?? 0;
                    let volumeChange = signal.volume_change ?? signal.volumeChange ?? 0;
                    let price = signal.price ?? 0;
                    let exchange = signal.exchange ?? '-';
                    let symbol = signal.symbol ?? '?';
                    let signalType = signal.signal_type ?? '?';
                    let timestamp = signal.timestamp;
                    let stage = signal.stage ?? 'CONFIRMED';
                    let bias = signal.bias ?? (isPump ? 'LONG' : 'SHORT');
                    let fundingRate = signal.funding_rate ?? signal.fundingRate ?? null;
                    let lsRatio = signal.long_short_ratio ?? signal.longShortRatio ?? null;
                    let timeframe = signal.timeframe ?? '15m';
                    let factors = signal.factors ?? signal.details?.factors ?? [];
                    // New metrics
                    let oiTrend = signal.oi_trend ?? null;
                    let takerRatio = signal.taker_buy_ratio != null ? parseFloat(signal.taker_buy_ratio) : null;
                    let liqUsd = signal.recent_liquidations_usd != null ? parseFloat(signal.recent_liquidations_usd) : null;
                    let liqSide = signal.liq_side ?? null;
                    let topTraderLs = signal.top_trader_ls_ratio != null ? parseFloat(signal.top_trader_ls_ratio) : null;
                    let isTrending = signal.is_trending ?? false;
                    let confidence = signal.confidence ?? 'LOW';
                    
                    // Ensure numeric values
                    oiChange = parseFloat(oiChange) || 0;
                    volumeChange = parseFloat(volumeChange) || 0;
                    price = parseFloat(price) || 0;
                    lsRatio = parseFloat(lsRatio) || 0;
                    
                    const tvInterval = convertTimeframe(timeframe);
                    const tvExchange = exchange.toUpperCase() === 'BYBIT' ? 'BYBIT' : 'BINANCE';
                    const tvUrl = `https://www.tradingview.com/chart/?symbol=${tvExchange}:${symbol}.P&interval=${tvInterval}`;

                    return `
                        <div class="signal-row" style="display: grid; grid-template-columns: 1fr 0.7fr 1fr 0.9fr 0.6fr 1fr 0.9fr 0.9fr 1fr 0.6fr 0.5fr 0.6fr 1.5fr 0.9fr 1.2fr; gap: 8px; padding: 12px 15px; border-bottom: 1px solid #30363d; align-items: center; font-size: 12px;">
                            <div class="symbol" onclick="openChart('${symbol}')" style="font-weight: 600; color: #58a6ff; cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px;" title="Открыть график">${symbol}${isTrending ? '<span style=\"font-size:10px;margin-left:3px;\" title=\"CoinGecko trending\">🔥</span>' : ''}</div>
                            <div>
                                <span class="badge ${isPump ? 'badge-pump' : 'badge-dump'}">
                                    ${signalType}
                                </span>
                            </div>
                            <div>${formatStage(stage)}</div>
                            <div>${formatDirection(bias, signalType)}</div>
                            <div class="score ${scoreClass}" title="${factors.length ? factors.join('\\n') : ''}" style="cursor:${factors.length ? 'help' : 'default'};">${score}/5${factors.length ? '<span style=\"font-size:9px;color:#8b949e;margin-left:2px;\">ⓘ</span>' : ''}</div>
                            <div class="price">$${formatNumber(price)}</div>
                            <div class="change ${oiChange > 0 ? 'change-positive' : 'change-negative'}">
                                ${oiChange > 0 ? '+' : ''}${oiChange.toFixed(1)}%
                            </div>
                            <div class="change ${volumeChange > 0 ? 'change-positive' : 'change-negative'}">
                                ${volumeChange > 0 ? '+' : ''}${volumeChange.toFixed(1)}%
                            </div>
                            <div>${formatFunding(fundingRate)}</div>
                            <div style="font-size: 11px;">${lsRatio ? lsRatio.toFixed(2) : '-'}</div>
                            <div style="color: #8b949e; font-size: 11px;">${timeframe}</div>
                            <div style="font-size: 11px; color: ${confidence === 'high' ? '#3fb950' : confidence === 'medium' ? '#d29922' : '#8b949e'};">${confidence ? confidence.charAt(0).toUpperCase() + confidence.slice(1) : '-'}</div>
                            <div style="font-size: 10px; color: #8b949e; line-height: 1.4; max-height: 40px; overflow: hidden; text-overflow: ellipsis;" title="${factors ? factors.join(' | ') : ''}">${factors ? factors.slice(0, 2).join(' | ') : '-'}</div>
                            <div class="exchange" onclick="window.open('${tvUrl}', '_blank')" style="cursor: pointer; color: #58a6ff; text-decoration: underline dotted; text-underline-offset: 3px;" title="Открыть в TradingView (${timeframe})">${exchange} ↗</div>
                            <div class="time">${formatTime(timestamp)}</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('signalsList').innerHTML = html || `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div>No valid signals to display</div>
                    </div>
                `;
            } catch (err) {
                console.error('Render error:', err);
                document.getElementById('signalsList').innerHTML = `
                    <div class="error">Render error: ${err.message}</div>
                `;
            }
        }
        
        function openChart(symbol) {
            console.log('Opening chart for:', symbol);
            document.getElementById('chartTitle').textContent = `Chart: ${symbol}`;
            document.getElementById('chartModal').classList.add('active');
            
            const widgetContainer = document.getElementById('tradingview-widget');
            widgetContainer.innerHTML = '';
            
            // Create unique container ID
            const containerId = 'tv-chart-' + Date.now();
            const chartDiv = document.createElement('div');
            chartDiv.id = containerId;
            chartDiv.style.cssText = 'width:100%;height:100%;';
            widgetContainer.appendChild(chartDiv);
            
            const tvSymbol = `BINANCE:${symbol}.P`;
            
            // Use TradingView Widget Constructor
            if (window.TradingView) {
                new window.TradingView.widget({
                    container_id: containerId,
                    symbol: tvSymbol,
                    interval: '15',
                    timezone: 'Europe/Moscow',
                    theme: 'dark',
                    style: '1',
                    locale: 'en',
                    toolbar_bg: '#161b22',
                    enable_publishing: false,
                    hide_top_toolbar: false,
                    hide_legend: false,
                    save_image: false,
                    height: '100%',
                    width: '100%'
                });
            } else {
                // Fallback: inject TradingView script first
                const tvScript = document.createElement('script');
                tvScript.src = 'https://s3.tradingview.com/tv.js';
                tvScript.async = true;
                tvScript.onload = function() {
                    new window.TradingView.widget({
                        container_id: containerId,
                        symbol: tvSymbol,
                        interval: '15',
                        timezone: 'Europe/Moscow',
                        theme: 'dark',
                        style: '1',
                        locale: 'en',
                        toolbar_bg: '#161b22',
                        enable_publishing: false,
                        hide_top_toolbar: false,
                        hide_legend: false,
                        save_image: false,
                        height: '100%',
                        width: '100%'
                    });
                };
                document.head.appendChild(tvScript);
            }
        }
        
        function showChartError(container, symbol, error) {
            container.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8b949e;padding:20px;">
                    <div style="font-size:48px;margin-bottom:20px;">📊</div>
                    <div style="font-size:18px;margin-bottom:10px;">Chart unavailable</div>
                    <div style="font-size:14px;color:#f85149;margin-bottom:20px;">${error}</div>
                    <a href="https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}.P&interval=15" 
                       target="_blank" 
                       style="background:#238636;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;">
                       Open in TradingView
                    </a>
                </div>
            `;
        }
        
        function closeChart() {
            document.getElementById('chartModal').classList.remove('active');
            document.getElementById('tradingview-widget').innerHTML = '';
        }
        
        // Close modal on click outside
        document.getElementById('chartModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeChart();
            }
        });
        
        function formatNumber(num) {
            if (!num) return '-';
            if (num >= 1000) return num.toFixed(0);
            if (num >= 1) return num.toFixed(2);
            return num.toFixed(4);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            // Add 3 hours for Moscow time (UTC+3)
            const mskDate = new Date(date.getTime() + 3 * 60 * 60 * 1000);
            return mskDate.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false 
            }) + ' MSK';
        }
        
        function formatFunding(fundingRate) {
            if (!fundingRate && fundingRate !== 0) return '-';
            const percent = (fundingRate * 100).toFixed(4);
            const color = fundingRate < 0 ? '#3fb950' : '#f85149';
            const direction = fundingRate < 0 ? 'Shorts pay' : 'Longs pay';
            return `<span style="color: ${color}">${percent}%</span><br><small style="color: #8b949e">${direction}</small>`;
        }
        
        function formatDirection(bias, signalType) {
            if (!bias) return signalType === 'pump' ? 'LONG' : 'SHORT';
            const isLong = bias.toUpperCase().includes('LONG') || bias.toUpperCase().includes('PUMP');
            const color = isLong ? '#3fb950' : '#f85149';
            const arrow = isLong ? '↑' : '↓';
            return `<span style="color: ${color}; font-weight: bold;">${arrow} ${bias.toUpperCase()}</span>`;
        }
        
        function formatStage(stage) {
            if (!stage) return '-';
            const isEarly = stage.toUpperCase().includes('EARLY');
            const bg = isEarly ? '#d29922' : '#238636';
            const text = isEarly ? 'РАНО, ЖДЕМ' : 'ЗАХОДИМ';
            return `<span style="background: ${bg}; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold;">${text}</span>`;
        }
        
        function convertTimeframe(tf) {
            if (!tf) return '15';
            const map = {
                '1m': '1', '3m': '3', '5m': '5', '15m': '15', '30m': '30',
                '1h': '60', '2h': '120', '4h': '240', '6h': '360', '12h': '720',
                '1d': 'D', '1w': 'W', '1M': 'M'
            };
            return map[tf] || '15';
        }
        
        function formatSignalBadges(oiTrend, takerRatio, liqUsd, liqSide, topTraderLs, globalLs, isPump) {
            const badges = [];

            // OI trend
            if (oiTrend === 'growing') {
                badges.push('<span style="color:#3fb950;" title="OI стабильно растёт">↑OI</span>');
            } else if (oiTrend === 'shrinking') {
                badges.push('<span style="color:#f85149;" title="OI падает">↓OI</span>');
            }

            // Taker buy/sell ratio
            if (takerRatio != null) {
                if (takerRatio > 1.5) {
                    badges.push('<span style="color:#3fb950;" title="Агрессивные покупки: ' + takerRatio.toFixed(2) + '">📈' + takerRatio.toFixed(1) + '</span>');
                } else if (takerRatio < 0.67) {
                    badges.push('<span style="color:#f85149;" title="Агрессивные продажи: ' + takerRatio.toFixed(2) + '">📉' + takerRatio.toFixed(1) + '</span>');
                }
            }

            // Liquidations
            if (liqUsd && liqUsd > 100000) {
                const liqM = liqUsd >= 1000000
                    ? (liqUsd / 1000000).toFixed(1) + 'M'
                    : Math.round(liqUsd / 1000) + 'K';
                const isGood = (liqSide === 'SHORT' && isPump) || (liqSide === 'LONG' && !isPump);
                const liqColor = isGood ? '#3fb950' : '#f85149';
                const liqLabel = liqSide === 'SHORT' ? '💥S' : liqSide === 'LONG' ? '💥L' : '💥';
                badges.push('<span style="color:' + liqColor + ';" title="' + (liqSide||'') + ' ликвидации: $' + liqM + '">' + liqLabel + '$' + liqM + '</span>');
            }

            // Top trader vs retail divergence
            if (topTraderLs != null && globalLs != null && globalLs > 0) {
                if (topTraderLs > 1.5 && globalLs < 1.0) {
                    badges.push('<span style="color:#3fb950;" title="Топ-трейдеры ЛОНГ, ритейл ШОРТ — бычья дивергенция">🐋↑</span>');
                } else if (topTraderLs < 0.7 && globalLs > 1.2) {
                    badges.push('<span style="color:#f85149;" title="Топ-трейдеры ШОРТ, ритейл ЛОНГ — медвежья дивергенция">🐋↓</span>');
                }
            }

            return badges.length ? badges.join(' ') : '<span style="color:#484f58;">—</span>';
        }

        function formatFactors(factors) {
            if (!factors || !Array.isArray(factors) || factors.length === 0) return '-';
            return factors.slice(0, 2).map(f => `<div style="font-size: 11px; color: #8b949e; margin: 1px 0;">• ${f}</div>`).join('');
        }
        
        function formatFactorsShort(factors) {
            if (!factors || !Array.isArray(factors) || factors.length === 0) return '-';
            // Truncate long factors to fit in table cell
            return factors.slice(0, 2).map(f => {
                const short = f.length > 25 ? f.substring(0, 25) + '...' : f;
                return short;
            }).join(' | ');
        }
    </script>
</body>
